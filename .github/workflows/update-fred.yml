name: Update FRED reference data (daily)

on:
  schedule:
    # 매일 08:10 KST (= 전날 23:10 UTC) — Pages 배포와 살짝 시차
    - cron: "10 23 * * *"
  workflow_dispatch: {} # 수동 실행 버튼

permissions:
  contents: write

concurrency:
  group: "update-fred"
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch FRED series and update data.js
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: node scripts/update-fred.mjs

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain data.js)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data.js
            git commit -m "chore: auto-update FRED reference data"
            git push
          else
            echo "No changes to data.js"
          fi
